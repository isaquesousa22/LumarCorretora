<!DOCTYPE html>
<html lang="pt-BR" data-theme="dracula">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Lumar Corretora</title>
    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">

</head>

<body class="bg-slate-100 min-h-screen light-theme">


    <div class="navbar bg-base-300 text-white shadow-lg">




        <div class="flex-1">
            <a class="text-2xl font-bold">
                Lumar Corretora
            </a>
        </div>

        <div class="flex-none">
           <button onclick="sair()" class="btn btn-error">
                 Sair
            </button>
            
        </div>

    </div>

    <div class="max-w-7xl mx-auto p-8">



        <div class="hero bg-base-200 rounded-xl shadow mb-8">

            <div class="hero-content text-center font-bold">

                <div>

                    <h1 class="text-4xl font-bold">
                        Bem-vindo!
                        </h1>

                        <span id="nomeUsuario" class="text-2xl">Parceiro</span>
                    </h1>

                    <p class="py-3 text-lg">
                        Área exclusiva dos parceiros da Lumar Corretora.
                    </p>

                </div>

            </div>

        </div>


        <div class="grid md:grid-cols-3 gap-6 text-black">

            <div class="card bg-white shadow-xl">

                <div class="card-body">

                    <h2 class="card-title">
                        🏪 Parceiros
                    </h2>

                    <p>
                        Veja todas as empresas parceiras cadastradas.
                    </p>

                    <div class="card-actions justify-end">

                        <a href="parceiros/parceiros.html"
                            class="btn btn-secondary bg-gradient-to-r from-cyan-500 to-blue-500 text-white">
                            Ver Parceiros
                        </a>

                    </div>

                </div>

            </div>

            <div class="card bg-white shadow-xl">

                <div class="card-body">

                    <h2 class="card-title">
                        👤 Meu Perfil
                    </h2>

                    <p>
                        Visualize e atualize seus dados cadastrais.
                    </p>

                    <div class="card-actions justify-end">

                        <a href="profile/index.html"
                            class="btn btn-secondary bg-gradient-to-r from-cyan-500 to-blue-500 text-white">
                            Meu Perfil
                        </a>

                    </div>

                </div>

            </div>

            <div class="card bg-white shadow-xl">

                <div class="card-body">

                    <h2 class="card-title">
                        📞 Contato
                    </h2>

                    <p>
                        Fale com a equipe da Lumar Corretora.
                    </p>

                    <div class="card-actions justify-end">

                        <button class="btn btn-secondary bg-gradient-to-r from-cyan-500 to-blue-500 text-white">
                            Entrar em Contato
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/logout.js"></script>
    <script type="module" src="js/themeToggle.js"></script>
    <script type="module" src="js/dashboard.js"></script>




    <script src="app.js"></script>
    <noscript>You need to enable JavaScript to View the full site.</noscript>


</body>

</html>
