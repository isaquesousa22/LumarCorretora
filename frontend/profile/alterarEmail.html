<!DOCTYPE html>
<html lang="pt-br" data-theme="dracula">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alterar E-mail</title>
    <link rel="shortcut icon" href="/frontend/img/favicon.ico" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
</head>

<body class="bg-base-100">

    <div class="navbar bg-gradient-to-r from-cyan-500 to-blue-500 text-white">

        <div class="flex-1">
            <a href="seguranca.html" class="btn btn-ghost">
                ← Voltar
            </a>
        </div>

        <div class="flex-none">
            <h1 class="text-2xl font-bold">
                Alterar E-mail
            </h1>
        </div>

    </div>

    <div class="flex justify-center mt-10">

        <div class="card bg-base-200 shadow-xl w-full max-w-lg">

            <div class="card-body">

                <form id="formEmail">

                    <div class="form-control">

                        <label class="label">

                            <span class="label-text">
                                E-mail atual
                            </span>

                        </label>

                        <input id="emailAtual" class="input input-bordered" readonly>

                    </div>

                    <div class="form-control mt-4">

                        <label class="label">

                            <span class="label-text">
                                Novo e-mail
                            </span>

                        </label>

                        <input id="novoEmail" type="email" class="input input-bordered" required>

                    </div>

                    <button class="btn btn-primary mt-6">

                        Salvar Novo E-mail

                    </button>

                </form>

            </div>

        </div>

    </div>

    <script type="module" src="/frontend/js/alterarEmail.js"></script>

</body>

</html>
